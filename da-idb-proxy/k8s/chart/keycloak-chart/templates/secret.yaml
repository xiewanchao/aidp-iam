# 1. Keycloak 管理员密码 Secret
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.keycloak.admin.secretName }}
  namespace: {{ .Release.Namespace | default "keycloak" }}
  labels:
    app: keycloak
    {{- include "keycloak.labels" . | nindent 4 }}
type: Opaque  # 通用 Secret 类型
data:
  # 密码需要用 Base64 编码（Helm 可通过 b64enc 函数自动编码）
  {{ .Values.keycloak.admin.passwordKey }}: {{ "admin" | b64enc }}  # 替换成你的真实密码（比如改成复杂密码）

---
# 2. PostgreSQL 密码 Secret
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.postgres.auth.secretName }}
  namespace: {{ .Release.Namespace | default "keycloak" }}
  labels:
    app: postgres
    {{- include "keycloak.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.postgres.auth.passwordKey }}: {{ "keycloak" | b64enc }}  # 替换成你的真实DB密码

