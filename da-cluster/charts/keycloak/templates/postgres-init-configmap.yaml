apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
data:
  create-opal-db.sql: |
    -- Create the opal database for OPAL Server pub/sub
    SELECT 'CREATE DATABASE opal OWNER {{ .Values.postgres.auth.username }}'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'opal')\gexec
