apiVersion: v1
kind: Service
metadata:
  name: keycloak-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    app: keycloak-proxy
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - port: 8090
    targetPort: proxy-http
    name: proxy-http
  selector:
    app: keycloak-proxy
