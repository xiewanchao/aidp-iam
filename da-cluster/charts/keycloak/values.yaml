keycloak:
  replicas: 2
  image:
    repository: keycloak-custom
    tag: 26.5.2
    pullPolicy: IfNotPresent
  admin:
    username: admin
    password: admin
  resources:
    limits:
      cpu: 2000m
      memory: 2000Mi
    requests:
      cpu: 500m
      memory: 1700Mi
  config:
    hostname: "http://localhost"
    backchannelDynamic: "true"
    proxyHeaders: xforwarded
    httpEnabled: "true"
    hostnameStrict: "false"
    healthEnabled: "true"
    cache: ispn
    db:
      type: postgres
      host: postgres
      database: keycloak
      username: keycloak

postgres:
  replicas: 1
  image:
    repository: postgres
    tag: "17"
    pullPolicy: IfNotPresent
  auth:
    username: keycloak
    password: keycloak
    databases:
      - keycloak
      - opal
  port: 5432
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""

keycloakProxy:
  replicas: 2
  image:
    repository: keycloak-proxy
    tag: v2
    pullPolicy: IfNotPresent
  env:
    KEYCLOAK_URL: "http://keycloak:8080"
    KC_REALM: "master"
    KC_CLIENT_ID: "idb-proxy-client"
    KC_NEW_CLIENT_ID: "data-agent"

keycloakInit:
  image:
    repository: keycloak-init
    tag: v1
    pullPolicy: IfNotPresent
  superAdmin:
    username: "super-admin"
    password: "SuperInit@123"
  clientId: "idb-proxy-client"
  secretName: "keycloak-idb-proxy-client"
  defaultTenant:
    realm: "data-agent"
    adminUser: "tenant-admin"
    adminPassword: "TenantAdmin@123"
    normalUser: "normal-user"
    normalPassword: "NormalUser@123"
