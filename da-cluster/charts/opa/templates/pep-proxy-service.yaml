apiVersion: v1
kind: Service
metadata:
  name: pep-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    app: pep-proxy
    {{- include "opa.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    name: http
    protocol: TCP
  - port: 9000
    targetPort: 9000
    name: grpc-authz
    protocol: TCP
  selector:
    app: pep-proxy
