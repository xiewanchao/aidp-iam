# AgentgatewayPolicy: ext-authz via pep-proxy gRPC
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: opa-ext-authz
  namespace: agentgateway-system
spec:
  traffic:
    extAuth:
      backendRef:
        name: pep-proxy
        namespace: opa
        port: 9000
      grpc: {}
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: keycloak-proxy-route
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: policy-api-route
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: identity-api-route
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: tenant-api-route
---
# keycloak-proxy routes (tenant/identity management)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak-proxy-route
  namespace: agentgateway-system
spec:
  parentRefs:
  - name: agentgateway-proxy
    namespace: agentgateway-system
  hostnames:
  - "localhost"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/v1/tenants
    backendRefs:
    - name: keycloak-proxy
      namespace: keycloak
      port: 8090
  - matches:
    - path:
        type: PathPrefix
        value: /api/v1/common
    backendRefs:
    - name: keycloak-proxy
      namespace: keycloak
      port: 8090
---
# pep-proxy routes (auth check + policy management)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: policy-api-route
  namespace: agentgateway-system
spec:
  parentRefs:
  - name: agentgateway-proxy
    namespace: agentgateway-system
  hostnames:
  - "localhost"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/v1/auth
    backendRefs:
    - name: pep-proxy
      namespace: opa
      port: 8000
  - matches:
    - path:
        type: PathPrefix
        value: /api/v1/policies
    backendRefs:
    - name: pep-proxy
      namespace: opa
      port: 8000
  - matches:
    - path:
        type: PathPrefix
        value: /api/v1/roles
    backendRefs:
    - name: pep-proxy
      namespace: opa
      port: 8000
---
# keycloak-proxy identity routes (roles, groups, users, idp)
# These paths are /api/v1/{realm}/roles|groups|users|idp — since Gateway API
# does not support parameterized path matching, we use a broad /api/v1/ prefix
# with lower priority (by ordering after the more specific policy-api-route).
# However, to avoid conflicts with /api/v1/policies and /api/v1/auth, we list
# the specific sub-paths that go to keycloak-proxy identity/IDP endpoints.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: identity-api-route
  namespace: agentgateway-system
spec:
  parentRefs:
  - name: agentgateway-proxy
    namespace: agentgateway-system
  hostnames:
  - "localhost"
  rules:
  - matches:
    - path:
        type: RegularExpression
        value: /api/v1/[^/]+/roles(/.*)?
    - path:
        type: RegularExpression
        value: /api/v1/[^/]+/groups(/.*)?
    - path:
        type: RegularExpression
        value: /api/v1/[^/]+/users(/.*)?
    - path:
        type: RegularExpression
        value: /api/v1/[^/]+/idp(/.*)?
    backendRefs:
    - name: keycloak-proxy
      namespace: keycloak
      port: 8090
---
# Business API routes (simulated with httpbin)
# /{tenant}/{resource}        → normal user accessible (OPA checks role binding)
# /{tenant}/admin/{resource}  → admin only (OPA checks is_admin flag)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tenant-api-route
  namespace: agentgateway-system
spec:
  parentRefs:
  - name: agentgateway-proxy
    namespace: agentgateway-system
  hostnames:
  - "localhost"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /anything
    backendRefs:
    - name: httpbin
      namespace: httpbin
      port: 8000
