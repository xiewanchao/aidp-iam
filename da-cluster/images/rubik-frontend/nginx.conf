server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ---------- Static frontend (SPA) ----------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------- Rubik backend API ----------
    # Proxy /kbApi/* to rubik-backend service
    location /kbApi/ {
        proxy_pass         http://rubik-backend:43252/kbApi/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (if rubik uses SSE/WS for streaming)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Long timeout for LLM streaming responses
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ---------- IAM API (your auth system) ----------
    # Proxy /api/v1/* to IAM gateway
    location /api/v1/ {
        proxy_pass         http://agentgateway-proxy.agentgateway-system.svc.cluster.local:80/api/v1/;
        proxy_set_header   Host              localhost;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ---------- Keycloak OIDC (login redirect / token) ----------
    location /realms/ {
        proxy_pass         http://agentgateway-proxy.agentgateway-system.svc.cluster.local:80/realms/;
        proxy_set_header   Host              localhost;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ---------- Cache static assets ----------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
